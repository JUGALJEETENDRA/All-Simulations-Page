<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2.3 Startup Eval Arcade</title>
    <style>
        :root {
            --red: #d32f2f;
            --dark: #b71c1c;
            --light: #ffcdd2;
            --bg: #f8f8f8;
            --white: #fff;
        }

        body {
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        h1 {
            color: var(--red);
            text-transform: uppercase;
            text-align: center;
            border-bottom: 3px solid var(--red);
        }

        .game {
            background: var(--white);
            border: 2px solid var(--red);
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 5px 5px 0 var(--light);
        }

        h2 {
            color: var(--dark);
            margin-top: 0;
        }

        button {
            background: var(--red);
            color: var(--white);
            border: 2px solid var(--dark);
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        button:hover {
            background: var(--white);
            color: var(--red);
        }

        .slots {
            display: flex;
            justify-content: space-around;
            font-size: 2em;
            color: var(--red);
            font-weight: bold;
            margin-bottom: 10px;
        }

        .bar-bg {
            background: #ddd;
            width: 100%;
            height: 30px;
            margin-top: 10px;
        }

        .bar-fill {
            background: var(--red);
            height: 100%;
            width: 50%;
            transition: 0.3s;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>2.3 Startup Evaluation</h1>

        <div class="game">
            <h2>Sim 1: Pitch Slot Machine</h2>
            <div class="slots">
                <div id="sl-c">C:?</div>
                <div id="sl-i">I:?</div>
                <div id="sl-e">E:?</div>
            </div>
            <button onclick="s1Spin()">Spin Startup Stats</button>
            <p id="s1-res" style="text-align:center; font-weight:bold;"></p>
        </div>

        <div class="game">
            <h2>Sim 2: The Execution Multiplier</h2>
            <p>Adjust Execution. See how it multiplies the base Concept (Idea).</p>
            <label>Concept Score: 80/100 (Fixed)</label><br><br>
            <label>Execution Score: <span id="s2-eval">50</span>/100</label>
            <input type="range" id="s2-e" min="0" max="100" value="50" style="width:100%" oninput="s2Calc()">
            <div class="bar-bg">
                <div class="bar-fill" id="s2-bar"></div>
            </div>
            <p id="s2-txt" style="text-align:center;">Viability: 40%</p>
        </div>

        <div class="game">
            <h2>Sim 3: The VC Dilemma</h2>
            <p>You are an investor. Which startup do you fund?</p>
            <div style="display:flex; gap:10px;">
                <button onclick="s3Choose('a')">Startup A: Concept 99, Execution 20</button>
                <button onclick="s3Choose('b')">Startup B: Concept 60, Execution 80</button>
            </div>
            <p id="s3-res" style="text-align:center; font-weight:bold; color:var(--red);"></p>
        </div>
    </div>

    <script>
        function s1Spin() {
            let c = Math.floor(Math.random() * 10); let i = Math.floor(Math.random() * 10); let e = Math.floor(Math.random() * 10);
            document.getElementById('sl-c').innerText = 'C:' + c; document.getElementById('sl-i').innerText = 'I:' + i; document.getElementById('sl-e').innerText = 'E:' + e;
            let p = document.getElementById('s1-res');
            if (e === 0) p.innerText = "FAILED! Execution is 0.";
            else if ((c + i) * e > 100) p.innerText = "UNICORN POTENTIAL!";
            else p.innerText = "Average Startup.";
        }
        function s2Calc() {
            let e = document.getElementById('s2-e').value;
            document.getElementById('s2-eval').innerText = e;
            let v = (80 * (e / 100));
            document.getElementById('s2-bar').style.width = v + "%";
            document.getElementById('s2-txt').innerText = "Viability: " + v + "% (A great idea needs execution!)";
        }
        function s3Choose(c) {
            if (c === 'b') document.getElementById('s3-res').innerText = "SMART! Ideas are cheap, execution is everything. Startup B wins.";
            else document.getElementById('s3-res').innerText = "BANKRUPT! Startup A had a great idea but couldn't deliver the product.";
        }
    </script>
</body>

</html>
